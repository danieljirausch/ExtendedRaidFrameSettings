name: Package and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package addon
        run: ./release.sh

      - name: Create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" "ExtendedRaidFrameSettings.zip" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
